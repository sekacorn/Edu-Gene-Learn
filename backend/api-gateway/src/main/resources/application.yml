spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Learning Integrator Routes
        - id: learning-integrator
          uri: http://learning-integrator:8081
          predicates:
            - Path=/api/v1/genomic-data/**,/api/v1/educational-data/**,/api/v1/environmental-data/**
          filters:
            - StripPrefix=0

        # Learning Visualizer Routes
        - id: learning-visualizer
          uri: http://learning-visualizer:8082
          predicates:
            - Path=/api/v1/visualizations/**,/api/v1/3d-models/**
          filters:
            - StripPrefix=0

        # User Session Routes
        - id: user-session
          uri: http://user-session:8083
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**,/api/v1/sessions/**
          filters:
            - StripPrefix=0

        # Collaboration Service Routes
        - id: collaboration-service
          uri: http://collaboration-service:8084
          predicates:
            - Path=/api/v1/collaboration/**,/ws/**
          filters:
            - StripPrefix=0

        # LLM Service Routes
        - id: llm-service
          uri: http://llm-service:8085
          predicates:
            - Path=/api/v1/llm/**,/api/v1/queries/**
          filters:
            - StripPrefix=0

        # AI Model Routes
        - id: ai-model
          uri: http://ai-model:8000
          predicates:
            - Path=/api/v1/predictions/**,/api/v1/recommendations/**
          filters:
            - StripPrefix=0

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - name: RequestRateLimiter
          args:
            redis-rate-limiter:
              replenishRate: ${RATE_LIMIT_REQUESTS_PER_MINUTE:100}
              burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:200}
        - name: CircuitBreaker
          args:
            name: defaultCircuitBreaker
            fallbackUri: forward:/fallback

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# Logging
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: INFO
